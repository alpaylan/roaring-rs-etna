[[tasks]]
mutations = ["bitmap_advance_past_back_eaccd09_1"]

[tasks.source]
repo = "https://github.com/RoaringBitmap/roaring-rs"
commits = ["eaccd090783fae53124c054b88afa953a31a83af"]
commit_subjects = ["fix: correctly empty bitmap container iter when advancing past the back"]
summary = "When `BitmapIter::advance_to` is called with `new_key > key_back`, the iterator should be emptied: the fix resets `self.key = self.key_back` and `self.value = 0`. The bug only clears `value_back`, leaving the front pointer on a stale key so `collect()` replays already-advanced-past values."

[tasks.injection]
kind = "patch"
files = ["roaring/src/bitmap/store/bitmap_store.rs"]
locations = [{ file = "roaring/src/bitmap/store/bitmap_store.rs" }]
patch = "patches/bitmap_advance_past_back_eaccd09_1.patch"

[tasks.bug]
short_name = "bitmap_advance_past_back"
invariant = "After `advance_back_to(b)` + `advance_to(a)` with `a > b`, the bitmap iterator must be empty."
how_triggered = "The fix sets `self.key = self.key_back` and `self.value = 0` when `new_key > key_back`; the bug only clears `value_back`, leaving the front pointer on a stale key so later `collect()` replays it. The BitmapStore leg of the witness (`advance_back_to(100) + advance_to(300)` over a dense container) exposes this."

[[tasks.tasks]]
property = "AdvanceToMatchesModel"
witnesses = [
  { test_fn = "witness_advance_to_past_end_case_compressed_run_bitmapiter" },
]

[[tasks]]
mutations = ["bitmap_advance_back_to_invariant_136b8f1_1"]

[tasks.source]
repo = "https://github.com/RoaringBitmap/roaring-rs"
commits = ["136b8f1e7a4807a0662e07646b8a03c1beb7b06d"]
commit_subjects = ["fix: bitmap advance_back_to could violate invariants"]
summary = "When `BitmapIter::advance_back_to` is called with `new_key < key`, the fix returns early with a fully-reset state. The bug falls through to `(0, &mut self.value)`, writing a 0 into the front word while leaving `key_back > key` — violating the `key_back >= key` invariant and tripping `debug_assert!` on subsequent iteration."

[tasks.injection]
kind = "patch"
files = ["roaring/src/bitmap/store/bitmap_store.rs"]
locations = [{ file = "roaring/src/bitmap/store/bitmap_store.rs" }]
patch = "patches/bitmap_advance_back_to_invariant_136b8f1_1.patch"

[tasks.bug]
short_name = "bitmap_advance_back_to_invariant"
invariant = "After `advance_to(f)` + `advance_back_to(b)` with `b < f` the `key_back >= key` invariant must still hold."
how_triggered = "The fix returns early with a fully-reset state when `new_key < key`; the bug falls through to `(0, &mut self.value)`, writing a 0 value into the front word while leaving `key_back` ahead of `key`. The BitmapStore leg of the witness (`advance_to(300) + advance_back_to(100)`) trips a `debug_assert!` in subsequent iteration. Requires `[profile.release] debug-assertions = true`."

[[tasks.tasks]]
property = "AdvanceBackToMatchesModel"
witnesses = [
  { test_fn = "witness_advance_back_to_before_start_case_compressed_run_bitmapiter" },
]

