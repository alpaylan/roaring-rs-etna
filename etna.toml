[[tasks]]
mutations = ["run_iter_forward_offset_reset_c41bab3_1"]

[tasks.source]
repo = "https://github.com/RoaringBitmap/roaring-rs"
commits = ["c41bab3f0eb50b26b25cef4c066608add6c63f01"]
commit_subjects = ["fix: when consuming a full run, reset the current offset"]
summary = "After consuming a full run, `RunIter::move_next` must reset `forward_offset` to `0`; the bug leaves the stale `u16::MAX` offset behind, so subsequent `RunIter::remaining_size` trips `debug_assert!(total_size >= total_offset)` and panics on `len()`."

[tasks.injection]
kind = "patch"
files = ["roaring/src/bitmap/store/interval_store.rs"]
locations = [{ file = "roaring/src/bitmap/store/interval_store.rs" }]
patch = "patches/run_iter_forward_offset_reset_c41bab3_1.patch"

[tasks.bug]
short_name = "run_iter_forward_offset_reset"
invariant = "After `Iter::nth(k)` lands on a container boundary the cached inner `RunIter` must hold `forward_offset == 0`; otherwise the subsequent `len()` fails `debug_assert!(total_size >= total_offset)` in `RunIter::remaining_size`."
how_triggered = "When a full run is consumed the fixed code resets `forward_offset = 0` before returning; the bug leaves the stale `u16::MAX` offset in place. The witness probes `nth(65_535) + len()` on a two-full-container bitmap, which stores the first container's `RunIter` in `Iter::front` with the stale offset; `len()` then panics. Requires `[profile.release] debug-assertions = true`."

[[tasks.tasks]]
property = "IterMatchesModel"
witnesses = [
  { test_fn = "witness_iter_matches_model_case_two_full_containers" },
]

