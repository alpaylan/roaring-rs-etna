name = "roaring-rs"
language = "rust"
strategies = ["proptest", "quickcheck", "crabcheck", "hegel"]
base_commit = "01ebbd16a9293c5ee724380f601696711558b9d9"

[[tasks]]
mutations = ["run_iter_forward_overflow_a24ff69_1"]

[tasks.source]
repo = "https://github.com/RoaringBitmap/roaring-rs"
commits = ["a24ff696b6e3cacd13479ab4358bba6f4ad02cdf"]
commit_subjects = ["fix: interval store iterator not stopping"]
summary = "`RunIter::move_next`'s `forward_offset` overflow branch failed to advance `self.intervals.next()`, so two back-to-back full-container runs replayed the same interval and produced a truncated iteration that diverged from the set model at the container boundary. The fix adds the missing `next()` call."

[tasks.injection]
kind = "patch"
files = ["roaring/src/bitmap/store/interval_store.rs"]
locations = [{ file = "roaring/src/bitmap/store/interval_store.rs" }]
patch = "patches/run_iter_forward_overflow_a24ff69_1.patch"

[tasks.bug]
short_name = "run_iter_forward_overflow"
invariant = "`rb.iter().collect::<Vec<_>>()` must equal the sorted `BTreeSet` model."
how_triggered = "When `forward_offset` is about to overflow `u16`, the fixed code advances `self.intervals.next()` before returning; the bug drops that call, so two back-to-back full-container runs produce a repeating / truncated forward iteration that diverges from the set model at the container boundary."

[[tasks.tasks]]
property = "IterMatchesModel"
witnesses = [
  { test_fn = "witness_iter_matches_model_case_two_full_containers" },
]

