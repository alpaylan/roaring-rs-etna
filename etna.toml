[[tasks]]
mutations = ["nth_over_u16_max_318366d_1"]

[tasks.source]
repo = "https://github.com/RoaringBitmap/roaring-rs"
commits = ["318366d041d958d59bef3e51569ecb452a1ea893"]
commit_subjects = ["fix: nth where n > u16::MAX is now correct"]
summary = "`<RunIter as Iterator>::nth` must short-circuit when `n > u16::MAX`; the bug keeps the counting loop, which internally narrows `n` to `u16` and wraps — effectively performing `nth(n % 2^16)` and returning the wrong element instead of `None`."

[tasks.injection]
kind = "patch"
files = ["roaring/src/bitmap/store/interval_store.rs"]
locations = [{ file = "roaring/src/bitmap/store/interval_store.rs" }]
patch = "patches/nth_over_u16_max_318366d_1.patch"

[tasks.bug]
short_name = "nth_over_u16_max"
invariant = "`iter.nth(k)` on a single full-container RunStore with `k > u16::MAX` must return `None`."
how_triggered = "The fix short-circuits the loop when `n > u16::MAX`; the bug keeps the loop, which internally narrows to `u16` and wraps, effectively performing `nth(n % 2^16)` and returning the wrong `Some`. The witness uses `advance_back_to(u16::MAX)` + `nth(100_000)` on a single full container so the `nth` call reaches `RunIter::nth` with `n > u16::MAX`."

[[tasks.tasks]]
property = "IterNthMatchesModel"
witnesses = [
  { test_fn = "witness_iter_nth_case_nth_over_u16_max" },
]
