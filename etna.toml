# ETNA workload index for roaring-rs.
#
# One [[variant]] per injected mutation. Source of truth for variant->property
# mapping. Every other fact is derivable from the source tree:
#   - ls patches/*.patch                              (patch-based variants)
#   - grep -rn "pub fn property_" roaring/src/etna.rs (property functions)
#   - grep -rn "fn witness_.*_case_" roaring/tests/   (witness tests)
#
# Base commit for this workload is HEAD of master on this tree. Every
# etna/<variant> branch is master + exactly one patch applied on top.

